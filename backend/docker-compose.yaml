version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: school-db
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      POSTGRES_DB: school
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: